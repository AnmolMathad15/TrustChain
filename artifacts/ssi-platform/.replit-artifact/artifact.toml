kind = "web"
previewPath = "/"
title = "SSI Platform"
version = "1.0.0"
id = "artifacts/ssi-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20434

[services.development]
run = "pnpm --filter @workspace/ssi-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ssi-platform", "run", "build" ]
publicDir = "artifacts/ssi-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20434"
BASE_PATH = "/"
